name: Claudeで新記録を検索してサイトに反映

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install anthropic

      - name: 新記録を検索してindex.htmlを更新
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GAS_URL: ${{ secrets.GAS_URL }}
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
        run: python update_records.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "新記録を追加・反映 $(date '+%Y年%m月%d日')"
          git push
