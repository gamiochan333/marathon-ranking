name: マラソン記録自動更新

on:
  schedule:
    - cron: '0 0 1 * *'  # 毎月1日 午前9時（JST）に実行
  workflow_dispatch:      # 手動実行ボタンも使えるようにする

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install anthropic

      - name: 記録を更新
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_records.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "マラソン記録を自動更新 $(date '+%Y年%m月%d日')"
          git push
