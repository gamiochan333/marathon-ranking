name: スプレッドシートからサイトに反映

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: スプレッドシートからindex.htmlを更新
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
        run: python sync_only.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "スプレッドシートからデータを反映 $(date '+%Y年%m月%d日')"
          git push
